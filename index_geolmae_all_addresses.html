<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인주회중 걸매리</title>
<style>
:root{--navy:#1e3a5f;--ink:#111827;--muted:#5f6b78;--line:#d7e0ea;--soft:#f6f8fb}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Malgun Gothic",sans-serif;background:#f5f7fa;color:var(--ink)}
.screen{min-height:100vh;display:none;justify-content:center;align-items:center;padding:18px 12px;opacity:0;transition:opacity .25s ease}
.active{display:flex;opacity:1}
.card{width:100%;max-width:470px;background:white;border:1.8px solid var(--navy);border-radius:22px;padding:22px 16px;text-align:center;box-shadow:0 8px 22px rgba(30,58,95,.08)}
.logo{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:16px}
.welcome{font-size:23px;font-weight:800;line-height:1.45;margin:22px 0}
.verse{margin-top:22px;padding:17px 15px;border:1px solid var(--line);border-radius:16px;background:#fff;font-size:16px;line-height:1.75;word-break:keep-all}
.ref{margin-top:10px;font-weight:800;color:var(--navy);font-size:15px}
.small{color:var(--muted);font-size:14px;margin-top:10px}
.footer{margin-top:20px;background:var(--navy);color:white;padding:11px;border-radius:14px;font-weight:800;font-size:15px}
.title{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:22px}
.menu-btn{width:100%;border:1.8px solid var(--navy);background:white;border-radius:17px;padding:17px;margin:12px 0;font-size:19px;font-weight:800;text-align:left;cursor:pointer;color:var(--ink)}
.menu-btn span{display:block;font-size:14px;font-weight:500;color:var(--muted);margin-top:7px;line-height:1.55}
button:active{transform:scale(.985);background:#eef4fb}
.area-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.area{font-size:20px;color:var(--navy);font-weight:900}
.page{font-size:14px;color:var(--muted);font-weight:800}
.progress{margin:10px 0 14px;text-align:left;font-weight:800;color:var(--navy);font-size:14px;background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:12px}
.bar{height:11px;background:#e5e9ef;border-radius:99px;overflow:hidden;margin-top:8px}
.bar-fill{height:100%;background:var(--navy);width:0%;transition:width .25s ease}
.house-card{border:1.7px solid var(--line);border-radius:18px;padding:12px 10px;margin:10px 0;text-align:left;background:#fff}
.house-head{display:flex;justify-content:space-between;align-items:center;gap:9px}
.house-num{font-size:23px;font-weight:900;color:#0f172a;border:2px solid var(--navy);border-radius:14px;padding:8px 8px;min-width:104px;text-align:center}
.house-name{font-size:15px;font-weight:800;color:#111;line-height:1.35;flex:1}
.house-addr{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.35}
.status-line{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:11px}
.status-btn{border:none;border-radius:10px;padding:9px 2px;font-size:12px;font-weight:900;cursor:pointer;white-space:nowrap}
.done{background:#dff4e6}.absent{background:#fff0bd}.revisit{background:#e3ecff}.reject{background:#ffe0e0}.etc{background:#eeeeee}
.saved{outline:2px solid var(--navy)}
.memo-line{margin-top:8px;font-size:13px;color:#374151;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:7px 9px;min-height:30px}
.etc-panel{display:none;margin-top:8px;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:9px}
.etc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.etc-choice{border:1px solid var(--line);background:white;border-radius:9px;padding:8px 3px;font-size:12px;font-weight:900;color:#374151}
.map-toggle{margin-top:8px;font-size:13px;font-weight:900;color:var(--navy);background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 9px;cursor:pointer}
.map-box{display:none;margin-top:8px;border:1px solid var(--line);border-radius:12px;background:#f8fafc;padding:10px}
.mini-map{height:90px;border-radius:10px;background:linear-gradient(135deg,#e9eff6 0 48%,#cfdbe8 48% 52%,#eef3f8 52%);position:relative;margin-bottom:8px}
.mini-map:before{content:'현재 위치';position:absolute;left:10px;bottom:10px;background:#1e3a5f;color:white;font-size:11px;padding:4px 7px;border-radius:99px}
.mini-map:after{content:'방문 집';position:absolute;right:12px;top:12px;background:#b91c1c;color:white;font-size:11px;padding:4px 7px;border-radius:99px}
.guide-text{font-size:13px;line-height:1.55;color:#374151;text-align:left}
.nav-row{display:flex;gap:10px;margin-top:14px}
.action{width:100%;border:none;border-radius:15px;padding:15px;margin:7px 0;font-size:17px;font-weight:900;cursor:pointer}
.back{background:var(--navy);color:white}.gray{background:#eef2f7;color:#111827}
.end-message{font-size:23px;font-weight:800;color:var(--navy);line-height:1.65}
@media(max-width:380px){.card{padding:20px 12px}.house-num{font-size:20px;min-width:92px}.status-btn{font-size:11px;padding:8px 1px}}
</style>
</head>
<body>

<div class="card">

<div class="footer">인주회중</div>

<section id="menu" class="screen">

<div class="footer">인주회중</div>
</div>
</section>

<section id="visit" class="screen">
<div class="card">
<div class="area-top">
<div class="area">걸매리</div>
<div class="page" id="pageText">1 / 1</div>
</div>

<div class="progress">
진행률 <span id="progressText">0 / 0</span>
<div class="bar"><div class="bar-fill" id="barFill"></div></div>
</div>

<div id="houseList"></div>

<div class="nav-row">
<button class="action gray" onclick="prevPage()">이전 3집</button>
<button class="action gray" onclick="nextPage()">다음 3집</button>
</div>

<button class="action back" onclick="showScreen('menu')">메뉴로</button>
</div>
</section>

<section id="end" class="screen">
<div class="card">
<div class="end-message">오늘도 수고 많으셨습니다.<br><br>남은 하루,<br>행복한 시간 되세요. 😊</div>
<button class="action back" onclick="showScreen('menu')">돌아가기</button>
</div>
</section>

let pageIndex=0;
const pageSize=3;

function showScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
setTimeout(()=>document.getElementById(id).classList.add('active'),30);
}
setTimeout(()=>showScreen('menu'),3000);

function startVisit(){
pageIndex=0;
renderVisit();
showScreen('visit');
}

function key(i){return "geolmae_full_status_"+i}
function memoKey(i){return "geolmae_full_memo_"+i}

function renderVisit(){
const start=pageIndex*pageSize;
const end=Math.min(start+pageSize,houses.length);
document.getElementById("pageText").innerText=(pageIndex+1)+" / "+Math.ceil(houses.length/pageSize);
let html="";
for(let i=start;i<end;i++){
const h=houses[i];
const saved=localStorage.getItem(key(i))||"";
const memo=localStorage.getItem(memoKey(i))||"";
html+=`
<div class="house-card">
  <div class="house-head">
    <div class="house-num">${h.num}</div>
    <div class="house-name">${h.name}<div class="house-addr">${h.addr}</div></div>
  </div>
  <div class="status-line">
    <button class="status-btn done ${saved==='방문완료'?'saved':''}" onclick="saveStatus(${i},'방문완료')">방문</button>
    <button class="status-btn absent ${saved==='부재'?'saved':''}" onclick="saveStatus(${i},'부재')">부재</button>
    <button class="status-btn revisit ${saved==='재방문'?'saved':''}" onclick="saveStatus(${i},'재방문')">재방문</button>
    <button class="status-btn reject ${saved==='거절'?'saved':''}" onclick="saveStatus(${i},'거절')">거절</button>
    <button class="status-btn etc ${saved==='기타'?'saved':''}" onclick="toggleEtc(${i})">기타</button>
  </div>
  <div class="etc-panel" id="etc_${i}">
    <div class="etc-grid">
      <button class="etc-choice" onclick="saveEtcChoice(${i},'창고')">창고</button>
      <button class="etc-choice" onclick="saveEtcChoice(${i},'축사')">축사</button>
      <button class="etc-choice" onclick="saveEtcChoice(${i},'공터')">공터</button>
      <button class="etc-choice" onclick="saveEtcChoice(${i},'폐가')">폐가</button>
      <button class="etc-choice" onclick="saveEtcChoice(${i},'방문사절')">방문사절</button>
      <button class="etc-choice" onclick="saveEtc(${i})">직접입력</button>
    </div>
  </div>
  <div class="memo-line" onclick="editMemo(${i})">${memo ? '메모: '+memo : '메모 없음'}</div>
  <div class="map-toggle" onclick="toggleMap(${i})">🗺 참고지도 ▼</div>
  <div class="map-box" id="map_${i}">
    <div class="mini-map"></div>
    <div class="guide-text">${h.guide}</div>
  </div>
</div>`;
}
document.getElementById("houseList").innerHTML=html;
updateProgress();
}

function saveStatus(i,status){
localStorage.setItem(key(i),status);
renderVisit();
}

function toggleEtc(i){
const panel=document.getElementById("etc_"+i);
if(!panel) return;
panel.style.display=panel.style.display==="block"?"none":"block";
}

function saveEtcChoice(i,text){
localStorage.setItem(key(i),"기타");
localStorage.setItem(memoKey(i),text);
renderVisit();
}

function saveEtc(i){
const memo=prompt("기타 내용을 입력하세요\\n예: 창고 / 축사 / 공터 / 폐가 / 방문사절", localStorage.getItem(memoKey(i))||"");
if(memo!==null){
localStorage.setItem(key(i),"기타");
localStorage.setItem(memoKey(i),memo.trim()||"기타");
renderVisit();
}
}

function editMemo(i){
const now=localStorage.getItem(memoKey(i))||"";
const memo=prompt("메모를 입력하세요",now);
if(memo!==null){
if(memo.trim()) localStorage.setItem(memoKey(i),memo.trim());
else localStorage.removeItem(memoKey(i));
renderVisit();
}
}

function toggleMap(i){
const box=document.getElementById("map_"+i);
if(!box) return;
box.style.display=box.style.display==="block"?"none":"block";
}

function nextPage(){
const maxPage=Math.ceil(houses.length/pageSize)-1;
if(pageIndex<maxPage){pageIndex++;renderVisit();}
}

function prevPage(){
if(pageIndex>0){pageIndex--;renderVisit();}
}

function updateProgress(){
let done=0;
houses.forEach((_,i)=>{if(localStorage.getItem(key(i)))done++});
const percent=Math.round(done/houses.length*100);
document.getElementById("progressText").innerText=done+" / "+houses.length+" ("+percent+"%)";
document.getElementById("barFill").style.width=percent+"%";
}
</script>
