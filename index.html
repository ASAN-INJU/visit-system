<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>인주회중 야외봉사시스템 v3</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top">

<h1>걸매리 마을회관 A</h1>
<div class="areaSelect">

<button onclick="loadArea('A')">
마을회관 A
</button>

<button onclick="loadArea('B')">
마을회관 B
</button>

</div>
<div class="progress">

<div class="progressText">
<span id="current">1</span> /
<span id="total">41</span>
</div>

<div class="progressBar">
<div id="progressFill"></div>
</div>

<div id="progressPercent">
0%
</div>

</div>

</header>


<main>

<div class="houseCard">

<div class="number" id="houseNumber">
89-10
</div>

<div class="name" id="houseName">
주찬양교회
</div>

<div class="address" id="houseAddress">
걸매길 89-10
</div>

<div class="buttons">
  
<button class="visit" onclick="setStatus('visit')">
방문함
</button>

<button class="absent" onclick="setStatus('absent')">
부재
</button>

<button class="reject" onclick="setStatus('reject')">
방문거절
</button>

<button class="closed" onclick="setStatus('closed')">
폐문부재
</button>

</div>

<textarea
id="memo"
placeholder="메모를 입력하세요"
></textarea>

<div class="nav">

<button onclick="prevHouse()">
◀ 이전
</button>

<button onclick="nextHouse()">
다음 ▶
</button>

</div>

</div>

</main>

<script src="houses_A.js"></script>
<script src="houses_B.js"></script>
<script src="app.js"></script>

</body>
</html>
