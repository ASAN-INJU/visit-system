<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>아산-인주 방문관리</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    background: #f4f6f8;
}

header {
    background: #2d89ef;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 18px;
}

.container {
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    cursor: pointer;
}

.done {
    background: #d4f8d4 !important;
}
</style>
</head>

<body>

<header>📍 아산-인주 방문관리</header>

<div class="container" id="list"></div>

<script>
// 샘플 10개 (나중에 150개 확장 가능)
let data = [];

for (let i = 1; i <= 20; i++) {
    data.push({
        id: i,
        name: "구역 " + i,
        done: false
    });
}

function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(item => {
        let div = document.createElement("div");
        div.className = "card" + (item.done ? " done" : "");
        div.innerHTML = item.name;

        div.onclick = function() {
            item.done = !item.done;
            render();
        };

        list.appendChild(div);
    });
}

render();
</script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
