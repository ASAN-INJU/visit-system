<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>아산-인주 방문관리 V4 TEST</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<!-- Kakao Map -->
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_APP_KEY"></script>

<style>
body { margin:0; font-family:Arial; }

header {
    background:#2d89ef;
    color:white;
    padding:10px;
    text-align:center;
}

#map { width:100%; height:45vh; }

#info {
    padding:10px;
    background:#f3f3f3;
    font-weight:bold;
}

.card {
    background:white;
    margin:5px;
    padding:10px;
    border-radius:8px;
    box-shadow:0 1px 2px rgba(0,0,0,0.2);
    cursor:pointer;
}

.done { background:#bff5c1 !important; }

.small { font-size:12px; color:gray; }
</style>
</head>

<body>

<header>📍 방문관리 V4 (TEST)</header>

<div id="info">로딩중...</div>
<div id="map"></div>
<div id="list"></div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= USER =================
let userName = prompt("이름 입력") || "user";

// ================= MAP =================
let map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(36.8690, 126.9290),
    level: 6
});

let data = [];
let markers = [];

// ================= LOAD =================
async function loadData() {

    let snap = await db.collection("visit").get();
    data = snap.docs.map(d => d.data());

    if (data.length === 0) {
        for (let i = 1; i <= 150; i++) {
            let item = {
                id: i,
                name: "구역 " + i,
                lat: 36.86 + Math.random() * 0.02,
                lng: 126.92 + Math.random() * 0.02,
                done: false,
                date: "",
                user: ""
            };

            data.push(item);
            db.collection("visit").doc(String(i)).set(item);
        }
    }

    render();
}

// ================= SAVE =================
function save(item) {
    db.collection("visit").doc(String(item.id)).set(item);
}

// ================= TOGGLE =================
function toggle(item) {

    item.done = !item.done;

    if (item.done) {
        item.date = new Date().toLocaleString();
        item.user = userName;
    } else {
        item.date = "";
        item.user = "";
    }

    save(item);
    render();
}

// ================= INFO =================
function updateInfo() {
    let done = data.filter(d => d.done).length;
    document.getElementById("info").innerText =
        `진행률: ${done}/150 | 사용자: ${userName}`;
}

// ================= RENDER =================
function render() {

    updateInfo();

    let list = document.getElementById("list");
    list.innerHTML = "";

    markers.forEach(m => m.setMap(null));
    markers = [];

    data.forEach(item => {

        let icon = item.done
        ? "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
        : "https://maps.google.com/mapfiles/ms/icons/red-dot.png";

        let marker = new kakao.maps.Marker({
            position: new kakao.maps.LatLng(item.lat, item.lng),
            map: map,
            image: new kakao.maps.MarkerImage(icon, new kakao.maps.Size(30,30))
        });

        kakao.maps.event.addListener(marker, () => toggle(item));

        markers.push(marker);

        let div = document.createElement("div");
        div.className = "card" + (item.done ? " done" : "");

        div.innerHTML = `
            <b>${item.name}</b><br>
            <span class="small">
                ${item.done ? "완료" : "미완료"}<br>
                ${item.user || ""} ${item.date || ""}
            </span>
        `;

        div.onclick = () => toggle(item);

        list.appendChild(div);
    });
}

// ================= START =================
loadData();

</script>

</body>
</html>
