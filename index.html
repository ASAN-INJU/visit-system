<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>아산-인주 방문관리 PWA</title>

<!-- Leaflet 지도 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
}

#topbar {
  background:#2c3e50;
  color:white;
  padding:10px;
  font-size:18px;
}

#map {
  height: 90vh;
  width: 100%;
}

#info {
  padding:10px;
  background:#f5f5f5;
}
</style>
</head>

<body>

<div id="topbar">
📍 아산-인주 방문관리 시스템
</div>

<div id="info">
총 집: <span id="total">0</span> /
방문: <span id="visited">0</span> /
부재: <span id="absent">0</span>
</div>

<div id="map"></div>

<script>
/* ================================
   1. 기본 데이터 (150개 구조)
================================ */
let houses = JSON.parse(localStorage.getItem("houses")) || [];

/* 처음 실행 시 더미 데이터 생성 */
if (houses.length === 0) {
  for (let i = 1; i <= 150; i++) {
    houses.push({
      id: i,
      name: "집 " + i,
      lat: 36.78 + (Math.random() * 0.02),
      lng: 126.45 + (Math.random() * 0.02),
      status: "none"
    });
  }
}

/* ================================
   2. 지도 생성
================================ */
const map = L.map('map').setView([36.78, 126.45], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let markers = [];

/* ================================
   3. 지도 그리기 함수
================================ */
function renderMap() {

  // 기존 마커 삭제
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  let visited = 0;
  let absent = 0;

  houses.forEach(h => {

    let color = "gray";

    if (h.status === "visited") {
      color = "green";
      visited++;
    }
    if (h.status === "absent") {
      color = "red";
      absent++;
    }

    const marker = L.circleMarker([h.lat, h.lng], {
      radius: 8,
      color: color,
      fillColor: color,
      fillOpacity: 0.9
    }).addTo(map);

    marker.bindPopup(`
      <b>${h.name}</b><br>
      상태: ${h.status}
    `);

    marker.on("click", () => {
      toggleStatus(h.id);
    });

    markers.push(marker);
  });

  document.getElementById("total").innerText = houses.length;
  document.getElementById("visited").innerText = visited;
  document.getElementById("absent").innerText = absent;

  saveData();
}

/* ================================
   4. 상태 변경
================================ */
function toggleStatus(id) {

  const h = houses.find(x => x.id === id);

  if (h.status === "none") h.status = "visited";
  else if (h.status === "visited") h.status = "absent";
  else h.status = "none";

  renderMap();
}

/* ================================
   5. 저장
================================ */
function saveData() {
  localStorage.setItem("houses", JSON.stringify(houses));
}

/* ================================
   6. 시작
================================ */
renderMap();

</script>

</body>
</html>
