<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>호별 방문 기록 V6 (팀+GPS+지도)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:Arial;margin:0;}
.container{display:flex;height:100vh;}
#map{width:60%;height:100%;}
#panel{width:40%;overflow:auto;padding:10px;}
.card{border:1px solid #ccc;padding:10px;margin:10px 0;border-radius:8px;}
button{margin:2px;padding:5px;}
.summary{background:#f5f5f5;padding:10px;}
.status{font-weight:bold;}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<div class="summary">
전체: <span id="total"></span> /
완료: <span id="done"></span> /
진행률: <span id="rate"></span>%
</div>

<div class="container">
<div id="map"></div>
<div id="panel"><div id="list"></div></div>
</div>

<script>

// =====================
// Firebase 설정 (여기 수정)
// =====================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =====================
// 지도
// =====================
let map = L.map('map').setView([36.8,126.9],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:''
}).addTo(map);

let markers=[];

// =====================
// GPS 현재 위치
// =====================
if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
        let lat=pos.coords.latitude;
        let lng=pos.coords.longitude;

        L.circleMarker([lat,lng],{
            radius:8,
            color:"blue"
        }).addTo(map).bindPopup("📍 내 위치");

        map.setView([lat,lng],14);
    });
}

// =====================
// 초기 데이터 생성
// =====================
async function init(){

    let snap = await db.collection("houses").get();

    if(snap.empty){

        for(let i=1;i<=150;i++){
            await db.collection("houses").doc(i+"").set({
                id:i,
                name:"현대로 "+(1200+i),
                desc:"구역 "+i,
                status:"none",
                lat:36.8+i*0.0005,
                lng:126.9+i*0.0005
            });
        }
    }

    load();
}

// =====================
// 데이터 불러오기
// =====================
async function load(){

    let snap = await db.collection("houses").get();

    houses=[];

    snap.forEach(doc=>{
        houses.push(doc.data());
    });

    render();
    drawMarkers();
}

// =====================
// 상태 변경
// =====================
function setStatus(id,status){

    db.collection("houses").doc(id+"").update({
        status:status
    }).then(()=>{
        load();
    });
}

// =====================
// 마커
// =====================
function drawMarkers(){

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    houses.forEach(h=>{

        let color="blue";
        if(h.status==="visited") color="green";
        if(h.status==="absent") color="orange";
        if(h.status==="reject") color="red";
        if(h.status==="closed") color="gray";

        let m=L.circleMarker([h.lat,h.lng],{
            radius:6,
            color:color
        }).addTo(map);

        m.bindPopup(`
            <b>${h.name}</b><br>
            ${h.desc}<br>
            상태: ${h.status}
        `);

        m.on('click',()=>{
            setStatus(h.id,"visited");
        });

        markers.push(m);
    });
}

// =====================
// 렌더
// =====================
function render(){

    let list=document.getElementById("list");
    list.innerHTML="";

    let total=houses.length;
    let done=houses.filter(h=>h.status==="visited").length;
    let rate=Math.round(done/total*100);

    document.getElementById("total").innerText=total;
    document.getElementById("done").innerText=done;
    document.getElementById("rate").innerText=rate;

    houses.forEach(h=>{

        let statusText="미방문";
        if(h.status==="visited") statusText="방문";
        if(h.status==="absent") statusText="부재중";
        if(h.status==="reject") statusText="거절";
        if(h.status==="closed") statusText="폐문";

        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <b>${h.name}</b><br>
            ${h.desc}<br>
            상태: <span class="status">${statusText}</span><br>

            <button onclick="setStatus(${h.id},'visited')">방문</button>
            <button onclick="setStatus(${h.id},'absent')">부재중</button>
            <button onclick="setStatus(${h.id},'reject')">거절</button>
            <button onclick="setStatus(${h.id},'closed')">폐문</button>
        `;

        list.appendChild(div);
    });
}

// =====================
// 시작
// =====================
init();

</script>

</body>
</html>
