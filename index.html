<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>호별 방문 기록</title>

<style>
body{
    font-family: Arial;
    margin:20px;
}

.card{
    border:1px solid #ccc;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
}

button{
    padding:8px;
    margin:3px;
}

.status{
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>호별 방문 기록</h2>

<div class="card">
    <h3>현대로1232</h3>
    <p>유진에어테크</p>

    <div class="status">상태 : 미방문</div>

    <button>방문함</button>
    <button>부재중</button>
    <button>방문거절</button>
    <button>폐문부재</button>
</div>

<div class="card">
    <h3>현대로1230</h3>
    <p>유진테크 사랑방</p>

    <div class="status">상태 : 미방문</div>

    <button>방문함</button>
    <button>부재중</button>
    <button>방문거절</button>
    <button>폐문부재</button>
</div>

</body>
</html>
