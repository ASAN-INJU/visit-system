<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>방문관리</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial}
#top{
background:#2c3e50;
color:white;
padding:10px;
text-align:center;
}
#map{
height:92vh;
}
</style>
</head>
<body>

<div id="top">아산 방문관리</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([36.8900,126.4500],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

let houses = [
{id:1,name:"1번집",lat:36.8900,lng:126.4500,status:"미방문"},
{id:2,name:"2번집",lat:36.8920,lng:126.4520,status:"미방문"},
{id:3,name:"3번집",lat:36.8940,lng:126.4480,status:"미방문"}
];

houses.forEach(h=>{

const marker=L.marker([h.lat,h.lng]).addTo(map);

marker.bindPopup(
`${h.name}<br>상태:${h.status}`
);

marker.on("click",()=>{

if(h.status==="미방문"){
h.status="방문";
}else if(h.status==="방문"){
h.status="부재";
}else{
h.status="미방문";
}

marker.setPopupContent(
`${h.name}<br>상태:${h.status}`
);

});

});

</script>

</body>
</html>
