<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>방문관리 V2 FIX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial}
#map{height:80vh}
textarea{width:100%;height:120px}
button{width:100%;padding:10px}
#panel{padding:10px;background:#f2f2f2}
</style>
</head>
<body>

<div id="panel">
<textarea id="input">
충남 아산시 인주면 걸매길100번길 5-9
충남 아산시 인주면 걸매길100번길 5-13
충남 아산시 인주면 걸매길100번길 5-15
</textarea>
<button onclick="run()">지도 생성</button>
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([36.8710,126.4280],14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let markers = [];

async function geocode(addr){

    try{
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`;
        const res = await fetch(url);
        const data = await res.json();

        if(data && data.length>0){
            return {
                lat: parseFloat(data[0].lat),
                lng: parseFloat(data[0].lon)
            };
        }
    }catch(e){
        console.log("API 오류",e);
    }

    return null;
}

async function run(){

    markers.forEach(m=>map.removeLayer(m));
    markers = [];

    const lines = document.getElementById("input").value
        .split("\n")
        .map(v=>v.trim())
        .filter(v=>v);

    for(let i=0;i<lines.length;i++){

        const addr = lines[i];

        console.log("주소 처리:",addr);

        const geo = await geocode(addr);

        if(!geo){
            console.log("좌표 실패:",addr);
            continue;
        }

        let status = "미방문";

        const marker = L.marker([geo.lat,geo.lng]).addTo(map);

        marker.bindPopup(getPopup(addr,status));

        marker.on("click",function(){

            if(status==="미방문") status="방문";
            else if(status==="방문") status="부재";
            else status="미방문";

            marker.setPopupContent(getPopup(addr,status));
        });

        markers.push(marker);

        await new Promise(r=>setTimeout(r,1000));
    }
}

function getPopup(addr,status){
    return `<b>${addr}</b><br>상태: ${status}`;
}

</script>

</body>
</html>
