<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>아산-인주 방문관리 PWA</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#topbar {
  background: #2c3e50;
  color: white;
  padding: 10px;
  font-size: 18px;
}

#info {
  padding: 10px;
  background: #f5f5f5;
  font-size: 14px;
}

#map {
  height: 90vh;
  width: 100%;
}
</style>
</head>

<body>

<div id="topbar">
📍 아산-인주 방문관리 시스템
</div>

<div id="info">
총 집: <span id="total">0</span> /
방문: <span id="visited">0</span> /
부재: <span id="absent">0</span>
</div>

<div id="map"></div>

<script>

/* =========================
   1. 데이터
========================= */
let houses = JSON.parse(localStorage.getItem("houses")) || [];

/* 최초 실행 */
if (houses.length === 0) {
  for (let i = 1; i <= 150; i++) {
    houses.push({
      id: Number(i),
      name: "집 " + i,
      lat: 36.78 + (Math.random() * 0.02),
      lng: 126.45 + (Math.random() * 0.02),
      status: "none",
      marker: null
    });
  }
}

/* =========================
   2. 지도 생성
========================= */
const map = L.map('map').setView([36.78, 126.45], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

/* =========================
   3. 마커 생성 (1회만)
========================= */
houses.forEach(h => {

  let color = "gray";

  const marker = L.circleMarker([h.lat, h.lng], {
    radius: 8,
    color: color,
    fillColor: color,
    fillOpacity: 0.9,
    weight: 2,
    interactive: true
  }).addTo(map);

  h.marker = marker;

  marker.bindPopup(`<b>${h.name}</b><br>상태: ${h.status}`);

  marker.on("click", () => {
    toggleStatus(h.id);
  });

});

/* =========================
   4. 상태 변경
========================= */
function toggleStatus(id) {

  const h = houses.find(x => x.id === Number(id));

  if (!h) return;

  if (h.status === "none") h.status = "visited";
  else if (h.status === "visited") h.status = "absent";
  else h.status = "none";

  updateMarker(h);
  updateInfo();
  saveData();
}

/* =========================
   5. 마커 색 업데이트
========================= */
function updateMarker(h) {

  let color = "gray";

  if (h.status === "visited") color = "green";
  if (h.status === "absent") color = "red";

  h.marker.setStyle({
    color: color,
    fillColor: color
  });

  h.marker.setPopupContent(
    `<b>${h.name}</b><br>상태: ${h.status}`
  );
}

/* =========================
   6. 통계 업데이트
========================= */
function updateInfo() {

  let visited = 0;
  let absent = 0;

  houses.forEach(h => {
    if (h.status === "visited") visited++;
    if (h.status === "absent") absent++;
  });

  document.getElementById("total").innerText = houses.length;
  document.getElementById("visited").innerText = visited;
  document.getElementById("absent").innerText = absent;
}

/* =========================
   7. 저장
========================= */
function saveData() {
  localStorage.setItem("houses", JSON.stringify(houses));
}

/* =========================
   8. 초기 통계
========================= */
updateInfo();

</script>

</body>
</html>
