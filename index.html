<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>인주회중</title>
<style>
body{font-family:-apple-system,sans-serif;background:#f5f7fb;margin:0}
.box{max-width:480px;margin:20px auto;background:#fff;border:2px solid #153b63;border-radius:20px;padding:16px}
h2{text-align:center;color:#153b63}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
button{padding:10px;border:0;border-radius:10px;font-weight:bold}
.done{background:#dff5e5}.abs{background:#fff1c7}.rev{background:#e5efff}.rej{background:#ffe0e0}.etc{background:#eee}
.card{border:1px solid #ccc;border-radius:12px;padding:10px;margin:10px 0}
.nav{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<div class="box">
<h2>걸매리 1~3 / 12집</h2>
<div>진행률 0%</div>
<div class="grid">
<button class="done">완료</button>
<button class="abs">부재</button>
<button class="rev">재방문</button>
<button class="rej">거절</button>
<button class="etc">기타</button>
</div>
<div class="card">① 걸매길100번길 5-5<br>상태 : 미방문</div>
<div class="card">② 걸매길100번길 5-3<br>상태 : 미방문</div>
<div class="card">③ 걸매길100번길 5-9<br>상태 : 미방문</div>
<div class="nav">
<button>◀ 이전3집</button>
<button>다음3집 ▶</button>
</div>
</div>
</body>
</html>
