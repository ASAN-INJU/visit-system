<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>인주회중</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;background:#f5f7fb;margin:0;color:#111}
.box{max-width:480px;margin:8px auto;background:#fff;border:2px solid #153b63;border-radius:20px;padding:10px}
h2{color:#153b63;margin:4px 0 8px;font-size:20px;display:flex;justify-content:space-between;gap:8px}
.progress{font-weight:bold;color:#153b63;margin:5px 0;font-size:14px}
.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:5px 0}
.fill{height:100%;width:0%;background:#153b63}
.card{border:1px solid #ccc;border-radius:12px;padding:7px;margin:6px 0;font-size:15px;line-height:1.3;background:white}
.top{display:flex;align-items:center;gap:7px;font-weight:bold;font-size:17px}
.num{background:#153b63;color:white;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex:none}
.state{font-size:14px;color:#555;margin:3px 0}
.memo{font-size:13px;color:#333;background:#f1f5f9;border-radius:8px;padding:5px;margin-top:4px;display:none}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:6px}
.etcgrid{display:none;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:5px}
button{padding:8px 2px;border:0;border-radius:9px;font-weight:bold;font-size:12px;cursor:pointer}
.done{background:#dff5e5}.abs{background:#fff1c7}.rev{background:#e5efff}.rej{background:#ffe0e0}.etc{background:#eee}.memoBtn{background:#f1f5f9}
.nav{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.nav button,.back{background:#153b63;color:white;font-size:15px}
.back{width:100%;margin-top:8px}
.menu{display:grid;gap:8px}
.menu button{font-size:18px;padding:16px;background:white;border:2px solid #153b63;text-align:left}
.select button{width:100%;font-size:18px;padding:14px;margin:6px 0;background:white;border:2px solid #153b63}
textarea{width:100%;min-height:80px;border:2px solid #153b63;border-radius:12px;padding:10px;font-size:16px}
</style>
</head>
<body>

<div id="menu" class="box">
<h2><span>인주회중</span><span>야외봉사</span></h2>
<div class="menu">
<button onclick="show('select')">🏠 호별방문</button>
<button onclick="alert('수요일 18:00~20:00\n토요일 10:00~12:00')">🪧 전시대봉사</button>
<button onclick="alert('다음 버전에 연결')">👥 오늘 참여</button>
<button onclick="alert('다음 버전에 연결')">👤 관리자</button>
</div>
</div>

<div id="select" class="box" style="display:none">
<h2><span>구역 선택</span></h2>
<div class="select">
<button onclick="startArea('걸매리')">걸매리</button>
<button onclick="startArea('문방리')">문방리</button>
<button onclick="startArea('관암리')">관암리</button>
</div>
<button class="back" onclick="show('menu')">메뉴로</button>
</div>

<div id="visit" class="box" style="display:none">
<h2><span id="areaTitle">걸매리</span><span id="range">1~3 / 12집</span></h2>
<div class="progress">진행률</div>
<div class="bar"><div id="fill" class="fill"></div></div>
<div id="progressText" class="progress">0 / 12 기록 (0%)</div>
<div id="houseList"></div>
<div class="nav">
<button onclick="prevGroup()">◀ 이전3집</button>
<button onclick="nextGroup()">다음3집 ▶</button>
</div>
<button class="back" onclick="show('select')">구역 선택으로</button>
</div>

<div id="memoScreen" class="box" style="display:none">
<h2><span id="memoTitle">메모</span></h2>
<textarea id="memoInput" placeholder="메모 입력"></textarea>
<button class="back" onclick="saveMemo()">저장</button>
<button class="back" onclick="show('visit')">돌아가기</button>
</div>

<script>
const areas={
 "걸매리":["걸매길100번길 5-5","걸매길100번길 5-3","걸매길100번길 5-9","걸매길100번길 5-13","걸매길100번길 5-15","걸매길100번길 8-6","걸매길100번길 5-6","걸매길100번길 8-8","걸매길100번길 19-8","걸매길100번길 22","걸매길100번길 23-8","걸매길100번길 26"],
 "문방리":["아산만로1462번길 7","아산만로1462번길 13-9","아산만로1462번길 13-11","아산만로1462번길 15","아산만로1462번길 16","문방리 391-8","문방리 391-12","문방리 391-13","문방리 392-5"],
 "관암리":["관암리 1번","관암리 2번","관암리 3번","관암리 4번","관암리 5번","관암리 6번"]
};
let currentArea="걸매리", groupStart=0, memoIndex=0;

function show(id){
 ["menu","select","visit","memoScreen"].forEach(x=>document.getElementById(x).style.display="none");
 document.getElementById(id).style.display="block";
 if(id==="visit") render();
}
function key(){return "status_"+currentArea}
function mkey(){return "memo_"+currentArea}
function getStatus(){return JSON.parse(localStorage.getItem(key())||"{}")}
function setStatusObj(o){localStorage.setItem(key(),JSON.stringify(o))}
function getMemo(){return JSON.parse(localStorage.getItem(mkey())||"{}")}
function setMemoObj(o){localStorage.setItem(mkey(),JSON.stringify(o))}
function startArea(a){currentArea=a;groupStart=0;show("visit")}

function mark(i,s){
 const o=getStatus(); o[i]=s; setStatusObj(o); render();
}
function toggleEtc(i){
 const e=document.getElementById("etc"+i);
 e.style.display=e.style.display==="grid"?"none":"grid";
}
function openMemo(i){
 memoIndex=i;
 const m=getMemo();
 document.getElementById("memoTitle").textContent=(i+1)+"번 메모";
 document.getElementById("memoInput").value=m[i]||"";
 show("memoScreen");
}
function saveMemo(){
 const m=getMemo(); m[memoIndex]=document.getElementById("memoInput").value.trim(); setMemoObj(m); show("visit");
}
function render(){
 const arr=areas[currentArea], st=getStatus(), mm=getMemo();
 document.getElementById("areaTitle").textContent=currentArea;
 const end=Math.min(groupStart+3,arr.length);
 document.getElementById("range").textContent=(groupStart+1)+"~"+end+" / "+arr.length+"집";
 let done=Object.keys(st).length, pct=Math.round(done/arr.length*100);
 document.getElementById("fill").style.width=pct+"%";
 document.getElementById("progressText").textContent=done+" / "+arr.length+" 기록 ("+pct+"%)";
 let html="";
 for(let i=groupStart;i<end;i++){
  let s=st[i]||"미방문";
  html+=`<div class="card">
   <div class="top"><div class="num">${i+1}</div><div>${arr[i]}</div></div>
   <div class="state">상태 : ${s}</div>
   <div class="memo" style="display:${mm[i]?'block':'none'}">${mm[i]||''}</div>
   <div class="grid">
    <button class="done" onclick="mark(${i},'완료')">완료</button>
    <button class="abs" onclick="mark(${i},'부재')">부재</button>
    <button class="rev" onclick="mark(${i},'재방문')">재방문</button>
    <button class="rej" onclick="mark(${i},'거절')">거절</button>
    <button class="etc" onclick="toggleEtc(${i})">기타▼</button>
   </div>
   <div id="etc${i}" class="etcgrid">
    <button onclick="mark(${i},'폐가')">폐가</button>
    <button onclick="mark(${i},'창고')">창고</button>
    <button onclick="mark(${i},'축사')">축사</button>
   </div>
   <div class="grid" style="grid-template-columns:1fr">
    <button class="memoBtn" onclick="openMemo(${i})">메모</button>
   </div>
  </div>`;
 }
 document.getElementById("houseList").innerHTML=html;
}
function nextGroup(){if(groupStart+3<areas[currentArea].length){groupStart+=3;render()}else alert("마지막입니다.")}
function prevGroup(){if(groupStart>0){groupStart-=3;render()}}
</script>
</body>
</html>
