<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>구역 방문 시스템 V2 (자동 배정)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:Arial;margin:0;}

#login{
    padding:20px;
}

#app{display:none;}

.zoneBtn{
    display:block;
    width:100%;
    padding:10px;
    margin:5px 0;
}

.container{
    display:flex;
    height:100vh;
}

#map{width:60%;}
#panel{width:40%;overflow:auto;padding:10px;}

.card{
    border:1px solid #ccc;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

.summary{
    background:#f5f5f5;
    padding:10px;
}

button{margin:2px;padding:5px;}

.status{font-weight:bold;}
</style>
</head>

<body>

<!-- ===================== -->
<!-- 로그인 -->
<!-- ===================== -->
<div id="login">
    <h2>👥 팀 로그인</h2>
    <input id="userName" placeholder="이름 입력">
    <button onclick="start()">시작</button>
</div>

<!-- ===================== -->
<!-- 앱 -->
<!-- ===================== -->
<div id="app">

<button onclick="logout()">로그아웃</button>

<div class="summary">
내 구역: <span id="myZone"></span><br>
진행률: <span id="rate"></span>%
</div>

<div class="container">
    <div id="map"></div>
    <div id="panel"><div id="list"></div></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// =====================
// 전체 데이터 (150집)
// =====================
let houses=[];

for(let i=1;i<=150;i++){
    houses.push({
        id:i,
        name:"현대로 "+(1200+i),
        desc:"구역 "+i,
        status:"none",
        lat:36.8+i*0.0004,
        lng:126.9+i*0.0004
    });
}

// =====================
// 사용자 정보
// =====================
let userName="";
let myZone=1;
let currentHouses=[];

// =====================
// 지도
// =====================
let map=L.map('map').setView([36.8,126.9],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:''
}).addTo(map);

let markers=[];

// =====================
// 로그인 + 자동 배정
// =====================
function start(){

    userName=document.getElementById("userName").value;

    if(!userName){
        alert("이름 입력");
        return;
    }

    // 이름 기반 자동 구역 배정
    myZone = (userName.length % 15) + 1;

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    loadZone();
}

// =====================
// 로그아웃
// =====================
function logout(){
    location.reload();
}

// =====================
// 구역 로딩
// =====================
function loadZone(){

    let start=(myZone-1)*10+1;
    let end=myZone*10;

    currentHouses=houses.filter(h=>h.id>=start && h.id<=end);

    document.getElementById("myZone").innerText=myZone+"번";

    render();
    drawMarkers();
}

// =====================
// 상태 변경
// =====================
function setStatus(id,status){
    let h=houses.find(x=>x.id===id);
    h.status=status;

    loadZone();
}

// =====================
// 지도
// =====================
function drawMarkers(){

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    currentHouses.forEach(h=>{

        let color="blue";
        if(h.status==="visited") color="green";
        if(h.status==="absent") color="orange";
        if(h.status==="reject") color="red";
        if(h.status==="closed") color="gray";

        let m=L.circleMarker([h.lat,h.lng],{
            radius:7,
            color:color
        }).addTo(map);

        m.bindPopup(`
            <b>${h.name}</b><br>
            ${h.desc}<br>
            상태: ${h.status}
        `);

        m.on('click',()=>{
            setStatus(h.id,"visited");
        });

        markers.push(m);
    });

    if(currentHouses.length>0){
        map.setView([currentHouses[0].lat,currentHouses[0].lng],15);
    }
}

// =====================
// 렌더
// =====================
function render(){

    let list=document.getElementById("list");
    list.innerHTML="";

    let total=currentHouses.length;
    let done=currentHouses.filter(h=>h.status==="visited").length;

    let rate=Math.round(done/total*100);

    document.getElementById("rate").innerText=rate;

    currentHouses.forEach(h=>{

        let statusText="미방문";
        if(h.status==="visited") statusText="방문";
        if(h.status==="absent") statusText="부재중";
        if(h.status==="reject") statusText="거절";
        if(h.status==="closed") statusText="폐문";

        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <b>${h.name}</b><br>
            상태: ${statusText}<br>

            <button onclick="setStatus(${h.id},'visited')">방문</button>
            <button onclick="setStatus(${h.id},'absent')">부재중</button>
            <button onclick="setStatus(${h.id},'reject')">거절</button>
            <button onclick="setStatus(${h.id},'closed')">폐문</button>
        `;

        list.appendChild(div);
    });
}

</script>

</body>
</html>
