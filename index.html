<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>아산-인주 방문관리 PWA</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#topbar {
  background: #2c3e50;
  color: white;
  padding: 10px;
  font-size: 18px;
}

#menu {
  background: #eee;
  padding: 10px;
  display: flex;
  gap: 10px;
}

button {
  padding: 8px 12px;
  border: none;
  background: #3498db;
  color: white;
  border-radius: 5px;
}

#info {
  padding: 10px;
  background: #f5f5f5;
  font-size: 14px;
}

#map {
  height: 80vh;
  width: 100%;
}
</style>
</head>

<body>

<div id="topbar">
📍 아산-인주 방문관리 시스템
</div>

<div id="menu">
<button onclick="move(INJU)">인주면</button>
<button onclick="move(YEONGIN)">영인면</button>
<button onclick="move(ALL)">전체</button>
</div>

<div id="info">
총 집: <span id="total">0</span> /
방문: <span id="visited">0</span> /
부재: <span id="absent">0</span>
</div>

<div id="map"></div>

<script>

/* =========================
   1. 구역 설정
========================= */
const INJU = { lat: 36.8710, lng: 126.4280, zoom: 15 };
const YEONGIN = { lat: 36.9050, lng: 126.4740, zoom: 15 };
const ALL = { lat: 36.8900, lng: 126.4500, zoom: 14 };

/* =========================
   2. 데이터
========================= */
let houses = JSON.parse(localStorage.getItem("houses")) || [];

/* 최초 생성 */
if (houses.length === 0) {
  for (let i = 1; i <= 150; i++) {

    let baseLat = (i <= 75) ? 36.8710 : 36.9050;
    let baseLng = (i <= 75) ? 126.4280 : 126.4740;

    houses.push({
      id: Number(i),
      name: "집 " + i,
      lat: baseLat + (Math.random() * 0.01),
      lng: baseLng + (Math.random() * 0.01),
      status: "none",
      marker: null
    });
  }
}

/* =========================
   3. 지도 생성 (아산 중심)
========================= */
const map = L.map('map').setView([36.8900, 126.4500], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

/* =========================
   4. 마커 생성
========================= */
houses.forEach(h => {

  let color = "gray";

  const marker = L.circleMarker([h.lat, h.lng], {
    radius: 8,
    color: color,
    fillColor: color,
    fillOpacity: 0.9,
    weight: 2,
    interactive: true
  }).addTo(map);

  h.marker = marker;

  marker.bindPopup(`<b>${h.name}</b><br>상태: ${h.status}`);

  marker.on("click", () => {
    toggleStatus(h.id);
  });
});

/* =========================
   5. 상태 변경
========================= */
function toggleStatus(id) {

  const h = houses.find(x => x.id === Number(id));
  if (!h) return;

  if (h.status === "none") h.status = "visited";
  else if (h.status === "visited") h.status = "absent";
  else h.status = "none";

  updateMarker(h);
  updateInfo();
  saveData();
}

/* =========================
   6. 마커 업데이트
========================= */
function updateMarker(h) {

  let color = "gray";

  if (h.status === "visited") color = "green";
  if (h.status === "absent") color = "red";

  h.marker.setStyle({
    color: color,
    fillColor: color
  });

  h.marker.setPopupContent(
    `<b>${h.name}</b><br>상태: ${h.status}`
  );
}

/* =========================
   7. 통계
========================= */
function updateInfo() {

  let visited = 0;
  let absent = 0;

  houses.forEach(h => {
    if (h.status === "visited") visited++;
    if (h.status === "absent") absent++;
  });

  document.getElementById("total").innerText = houses.length;
  document.getElementById("visited").innerText = visited;
  document.getElementById("absent").innerText = absent;
}

/* =========================
   8. 저장
========================= */
function saveData() {
  localStorage.setItem("houses", JSON.stringify(houses));
}

/* =========================
   9. 구역 이동
========================= */
function move(area) {
  map.setView([area.lat, area.lng], area.zoom);
}

/* =========================
   10. 초기 통계
========================= */
updateInfo();

</script>

</body>
</html>
