<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>구역 방문 시스템 V1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:Arial;margin:0;}

/* 구역 선택 화면 */
#zoneList{
    padding:20px;
}

.zoneBtn{
    display:block;
    width:100%;
    padding:10px;
    margin:5px 0;
    font-size:16px;
}

/* 앱 화면 */
#app{
    display:none;
}

.container{
    display:flex;
    height:100vh;
}

#map{
    width:60%;
}

#panel{
    width:40%;
    overflow:auto;
    padding:10px;
}

.summary{
    background:#f5f5f5;
    padding:10px;
}

.card{
    border:1px solid #ccc;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

button{margin:2px;padding:5px;}

.status{font-weight:bold;}
</style>
</head>

<body>

<!-- ===================== -->
<!-- 구역 선택 화면 -->
<!-- ===================== -->
<div id="zoneList"></div>

<!-- ===================== -->
<!-- 앱 화면 -->
<!-- ===================== -->
<div id="app">

<button onclick="back()">⬅ 구역 목록</button>

<div class="summary">
전체: <span id="total"></span> /
완료: <span id="done"></span> /
진행률: <span id="rate"></span>%
</div>

<div class="container">
    <div id="map"></div>
    <div id="panel"><div id="list"></div></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// =====================
// 전체 데이터 (150집)
// =====================
let houses = [];

for(let i=1;i<=150;i++){
    houses.push({
        id:i,
        name:"현대로 "+(1200+i),
        desc:"구역 "+i,
        status:"none",
        lat:36.8+i*0.0004,
        lng:126.9+i*0.0004
    });
}

// 현재 구역
let currentZone = 1;
let currentHouses = [];

// =====================
// 지도
// =====================
let map = L.map('map').setView([36.8,126.9],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:''
}).addTo(map);

let markers=[];

// =====================
// 구역 목록 생성
// =====================
function renderZones(){

    let zoneList = document.getElementById("zoneList");
    zoneList.innerHTML = "<h2>📍 구역 선택</h2>";

    for(let i=1;i<=15;i++){ // 15개 구역 (10집씩)

        let btn = document.createElement("button");
        btn.className="zoneBtn";
        btn.innerText = i + "번 구역";

        btn.onclick = () => openZone(i);

        zoneList.appendChild(btn);
    }
}

// =====================
// 구역 들어가기
// =====================
function openZone(zoneId){

    currentZone = zoneId;

    document.getElementById("zoneList").style.display="none";
    document.getElementById("app").style.display="block";

    loadZone(zoneId);
}

// =====================
// 구역 데이터 로딩
// =====================
function loadZone(zoneId){

    let start = (zoneId-1)*10 + 1;
    let end = zoneId*10;

    currentHouses = houses.filter(h => h.id>=start && h.id<=end);

    render();
    drawMarkers();
}

// =====================
// 뒤로가기
// =====================
function back(){

    document.getElementById("zoneList").style.display="block";
    document.getElementById("app").style.display="none";
}

// =====================
// 상태 변경
// =====================
function setStatus(id,status){

    let h = houses.find(x=>x.id===id);
    h.status=status;

    loadZone(currentZone);
}

// =====================
// 지도 마커
// =====================
function drawMarkers(){

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    currentHouses.forEach(h=>{

        let color="blue";
        if(h.status==="visited") color="green";
        if(h.status==="absent") color="orange";
        if(h.status==="reject") color="red";
        if(h.status==="closed") color="gray";

        let m = L.circleMarker([h.lat,h.lng],{
            radius:7,
            color:color
        }).addTo(map);

        m.bindPopup(`
            <b>${h.name}</b><br>
            ${h.desc}<br>
            상태: ${h.status}
        `);

        m.on('click',()=>{
            setStatus(h.id,"visited");
        });

        markers.push(m);
    });

    if(currentHouses.length>0){
        map.setView([currentHouses[0].lat,currentHouses[0].lng],15);
    }
}

// =====================
// 렌더
// =====================
function render(){

    let list = document.getElementById("list");
    list.innerHTML="";

    let total=currentHouses.length;
    let done=currentHouses.filter(h=>h.status==="visited").length;
    let rate=Math.round(done/total*100);

    document.getElementById("total").innerText=total;
    document.getElementById("done").innerText=done;
    document.getElementById("rate").innerText=rate;

    currentHouses.forEach(h=>{

        let statusText="미방문";
        if(h.status==="visited") statusText="방문";
        if(h.status==="absent") statusText="부재중";
        if(h.status==="reject") statusText="거절";
        if(h.status==="closed") statusText="폐문";

        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <b>${h.name}</b><br>
            ${h.desc}<br>
            상태: <span class="status">${statusText}</span><br>

            <button onclick="setStatus(${h.id},'visited')">방문</button>
            <button onclick="setStatus(${h.id},'absent')">부재중</button>
            <button onclick="setStatus(${h.id},'reject')">거절</button>
            <button onclick="setStatus(${h.id},'closed')">폐문</button>
        `;

        list.appendChild(div);
    });
}

// =====================
// 시작
// =====================
renderZones();

</script>

</body>
</html>
