<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아산·인주 방문관리 v2</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,"Noto Sans KR",sans-serif;
  background:#f2f4f7;
  color:#222;
}
header{
  background:#1565c0;
  color:white;
  text-align:center;
  padding:18px;
  font-size:24px;
  font-weight:bold;
}
.container{
  max-width:760px;
  margin:auto;
  padding:15px;
}
.card{
  background:white;
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 2px 8px #0002;
}
h2{margin-top:0}
button{
  border:0;
  border-radius:10px;
  padding:12px 14px;
  margin:5px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
.btn{background:#1565c0;color:white}
.gray{background:#777;color:white}
.green{background:#2e7d32;color:white}
.orange{background:#ef6c00;color:white}
.red{background:#c62828;color:white}
.light{background:#e3f2fd;color:#0d47a1}
.small{font-size:14px;padding:8px 10px}
input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0 12px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:16px;
}
textarea{min-height:70px}
.hidden{display:none}
.person{
  display:inline-block;
  background:#e3f2fd;
  padding:10px 12px;
  margin:5px;
  border-radius:20px;
  cursor:pointer;
}
.selected{background:#1565c0;color:white}
.pair{
  background:#f9f9f9;
  border-left:5px solid #1565c0;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}
.menu button{width:100%;margin:6px 0}
.status button{width:46%}
.bigNum{
  font-size:52px;
  font-weight:bold;
  text-align:center;
  margin:8px 0 12px;
  color:#1565c0;
}
.houseBox{
  text-align:center;
  line-height:1.7;
  font-size:19px;
  background:#f7fbff;
  border-radius:12px;
  padding:14px;
}
.progress{
  height:14px;
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
  margin:10px 0;
}
.bar{
  height:100%;
  background:#1565c0;
  width:0%;
}
.areaGrid button{
  width:46%;
  min-height:54px;
}
.badge{
  display:inline-block;
  padding:5px 9px;
  border-radius:15px;
  background:#eee;
  margin:3px;
  font-size:14px;
}
.done{background:#e8f5e9;color:#1b5e20}
.absent{background:#fff3e0;color:#e65100}
.reject{background:#ffebee;color:#b71c1c}
</style>
</head>

<body>

<header>아산·인주 방문관리 v2</header>

<div class="container">

<!-- 홈 -->
<div id="home">
  <div class="card">
    <h2>오늘 현황판</h2>
    <p id="todaySummary">불러오는 중...</p>
  </div>

  <div class="card menu">
    <button class="btn" onclick="showPage('joinPage')">오늘 참여</button>
    <button class="btn" onclick="showPage('visitPairPage')">구역 방문 짝짓기</button>
    <button class="btn" onclick="showPage('standPairPage')">전시대 짝짓기</button>
    <button class="green" onclick="showPage('areaPage')">구역 방문 시작</button>
    <button class="orange" onclick="showPage('statsPage'); renderStats()">통계</button>
    <button class="red" onclick="resetToday()">오늘 참여 초기화</button>
  </div>
</div>

<!-- 오늘 참여 -->
<div id="joinPage" class="hidden">
  <div class="card">
    <h2>오늘 참여</h2>
    <input id="nameInput" placeholder="이름 입력">
    <button class="btn" onclick="addParticipant()">참여 추가</button>
    <div id="participantList"></div>
    <button class="gray" onclick="showPage('home')">뒤로</button>
  </div>
</div>

<!-- 구역 방문 짝짓기 -->
<div id="visitPairPage" class="hidden">
  <div class="card">
    <h2>구역 방문 짝짓기</h2>
    <p>2명을 선택한 뒤 짝 만들기를 누르세요. 짝이 된 사람은 남은 명단에서 자동으로 숨겨집니다.</p>
    <div id="visitAvailable"></div>
    <button class="btn" onclick="makePair('visit')">짝 만들기</button>
    <h3>완성된 짝</h3>
    <div id="visitPairs"></div>
    <button class="gray" onclick="showPage('home')">뒤로</button>
  </div>
</div>

<!-- 전시대 짝짓기 -->
<div id="standPairPage" class="hidden">
  <div class="card">
    <h2>전시대 짝짓기</h2>
    <p>전시대도 구역 방문처럼 수동으로 짝을 만듭니다.</p>
    <div id="standAvailable"></div>
    <button class="btn" onclick="makePair('stand')">전시대 짝 만들기</button>
    <h3>완성된 전시대 짝</h3>
    <div id="standPairs"></div>
    <button class="gray" onclick="showPage('home')">뒤로</button>
  </div>
</div>

<!-- 구역 선택 -->
<div id="areaPage" class="hidden">
  <div class="card">
    <h2>구역 선택</h2>
    <div class="areaGrid" id="areaButtons"></div>
    <button class="gray" onclick="showPage('home')">뒤로</button>
  </div>
</div>

<!-- 방문 화면 -->
<div id="visitPage" class="hidden">
  <div class="card">
    <h2 id="areaTitle"></h2>
    <div class="progress"><div id="areaBar" class="bar"></div></div>
    <p id="areaProgress"></p>
    <div id="houseInfo"></div>

    <div class="status">
      <button class="green" onclick="saveStatus('방문함')">방문함</button>
      <button class="orange" onclick="saveStatus('부재중')">부재중</button>
      <button class="red" onclick="saveStatus('방문거절')">방문거절</button>
      <button class="gray" onclick="saveStatus('폐문부재')">폐문부재</button>
    </div>

    <textarea id="memoInput" placeholder="메모"></textarea>
    <button class="btn" onclick="nextHouse()">다음 집</button>
    <button class="light" onclick="prevHouse()">이전 집</button>
    <button class="gray" onclick="showPage('areaPage')">구역 선택으로</button>
  </div>
</div>

<!-- 통계 -->
<div id="statsPage" class="hidden">
  <div class="card">
    <h2>통계</h2>
    <div id="statsBox"></div>
    <button class="gray" onclick="showPage('home')">뒤로</button>
  </div>
</div>

</div>

<script>
let participants = JSON.parse(localStorage.getItem("participants") || "[]");
let visitPairs = JSON.parse(localStorage.getItem("visitPairs") || "[]");
let standPairs = JSON.parse(localStorage.getItem("standPairs") || "[]");
let records = JSON.parse(localStorage.getItem("records") || "{}");

let selectedVisit = [];
let selectedStand = [];
let currentArea = "";
let currentIndex = 0;

const areas = {
  "걸매리":[
    {번호:"1", 건물번호:"걸매길100번길 5-5", 이름:""},
    {번호:"2", 건물번호:"걸매길100번길 5-3", 이름:""},
    {번호:"3", 건물번호:"걸매길100번길 5-9", 이름:""},
    {번호:"4", 건물번호:"걸매길100번길 5-13", 이름:""},
    {번호:"5", 건물번호:"걸매길100번길 5-15", 이름:""},
    {번호:"6", 건물번호:"걸매길100번길 8-6", 이름:""},
    {번호:"7", 건물번호:"걸매길100번길 5-6", 이름:""},
    {번호:"8", 건물번호:"걸매길100번길 8-8", 이름:""},
    {번호:"9", 건물번호:"걸매길100번길 19-8", 이름:""},
    {번호:"10", 건물번호:"걸매길100번길 22", 이름:""},
    {번호:"11", 건물번호:"걸매길100번길 23-8", 이름:""},
    {번호:"12", 건물번호:"걸매길100번길 26", 이름:""},
    {번호:"13", 건물번호:"걸매길100번길 29", 이름:""},
    {번호:"14", 건물번호:"걸매길100번길 34-4", 이름:""},
    {번호:"15", 건물번호:"걸매길100번길 34-10", 이름:""},
    {번호:"16", 건물번호:"걸매길100번길 34-7", 이름:""},
    {번호:"17", 건물번호:"걸매길100번길 39", 이름:""}
  ],
  "문방리":[
    {번호:"1", 건물번호:"문방리 391-8", 이름:""},
    {번호:"2", 건물번호:"문방리 391-12", 이름:""},
    {번호:"3", 건물번호:"문방리 391-13", 이름:""},
    {번호:"4", 건물번호:"문방리 392-5", 이름:""},
    {번호:"5", 건물번호:"문방리 393-2", 이름:""}
  ],
  "대음리":[
    {번호:"1", 건물번호:"1번 집", 이름:""},
    {번호:"2", 건물번호:"2번 집", 이름:""},
    {번호:"3", 건물번호:"3번 집", 이름:""}
  ],
  "관암리":[
    {번호:"1", 건물번호:"1번 집", 이름:""},
    {번호:"2", 건물번호:"2번 집", 이름:""},
    {번호:"3", 건물번호:"3번 집", 이름:""}
  ],
  "밀두리":[
    {번호:"1", 건물번호:"1번 집", 이름:""},
    {번호:"2", 건물번호:"2번 집", 이름:""},
    {번호:"3", 건물번호:"3번 집", 이름:""}
  ],
  "공세리":[
    {번호:"1", 건물번호:"1번 집", 이름:""},
    {번호:"2", 건물번호:"2번 집", 이름:""},
    {번호:"3", 건물번호:"3번 집", 이름:""}
  ]
};

function saveAll(){
  localStorage.setItem("participants", JSON.stringify(participants));
  localStorage.setItem("visitPairs", JSON.stringify(visitPairs));
  localStorage.setItem("standPairs", JSON.stringify(standPairs));
  localStorage.setItem("records", JSON.stringify(records));
  renderAll();
}

function showPage(id){
  document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  renderAll();
}

function addParticipant(){
  const name = document.getElementById("nameInput").value.trim();
  if(!name) return alert("이름을 입력하세요.");
  if(participants.includes(name)) return alert("이미 등록된 이름입니다.");
  participants.push(name);
  document.getElementById("nameInput").value="";
  saveAll();
}

function removeParticipant(name){
  if(!confirm(name+" 님을 오늘 참여 명단에서 삭제할까요?")) return;
  participants = participants.filter(p=>p!==name);
  visitPairs = visitPairs.filter(pair=>!pair.includes(name));
  standPairs = standPairs.filter(pair=>!pair.includes(name));
  selectedVisit = selectedVisit.filter(p=>p!==name);
  selectedStand = selectedStand.filter(p=>p!==name);
  saveAll();
}

function pairedNames(type){
  const pairs = type==="visit" ? visitPairs : standPairs;
  return pairs.flat();
}

function toggleSelect(name,type){
  const arr = type==="visit" ? selectedVisit : selectedStand;
  const i = arr.indexOf(name);
  if(i>=0) arr.splice(i,1);
  else {
    if(arr.length>=2) return alert("2명까지만 선택할 수 있습니다.");
    arr.push(name);
  }
  renderAll();
}

function makePair(type){
  const arr = type==="visit" ? selectedVisit : selectedStand;
  if(arr.length!==2) return alert("2명을 선택하세요.");
  if(type==="visit"){
    visitPairs.push([...arr]);
    selectedVisit=[];
  }else{
    standPairs.push([...arr]);
    selectedStand=[];
  }
  saveAll();
}

function removePair(type,index){
  if(!confirm("이 짝을 해제할까요?")) return;
  if(type==="visit") visitPairs.splice(index,1);
  else standPairs.splice(index,1);
  saveAll();
}

function renderParticipants(){
  const box = document.getElementById("participantList");
  if(!box) return;
  box.innerHTML =
    participants.length
    ? participants.map(n=>`
      <div class="pair">
        ${n}
        <button class="red small" onclick="removeParticipant('${safe(n)}')">삭제</button>
      </div>
    `).join("")
    : "<p>아직 참여자가 없습니다.</p>";
}

function renderPairPage(type){
  const availableId = type==="visit" ? "visitAvailable" : "standAvailable";
  const pairId = type==="visit" ? "visitPairs" : "standPairs";
  const pairs = type==="visit" ? visitPairs : standPairs;
  const selected = type==="visit" ? selectedVisit : selectedStand;
  const used = pairedNames(type);
  const available = participants.filter(p=>!used.includes(p));

  const av = document.getElementById(availableId);
  const pb = document.getElementById(pairId);
  if(!av || !pb) return;

  av.innerHTML =
    available.length
    ? available.map(n=>`
      <span class="person ${selected.includes(n) ? 'selected':''}" onclick="toggleSelect('${safe(n)}','${type}')">${n}</span>
    `).join("")
    : "<p>남은 명단이 없습니다.</p>";

  pb.innerHTML =
    pairs.length
    ? pairs.map((p,i)=>`
      <div class="pair">
        ${i+1}. ${p[0]} ↔ ${p[1]}
        <button class="red small" onclick="removePair('${type}',${i})">짝 해제</button>
      </div>
    `).join("")
    : "<p>아직 만든 짝이 없습니다.</p>";
}

function renderAreaButtons(){
  const box = document.getElementById("areaButtons");
  if(!box) return;
  box.innerHTML = Object.keys(areas).map(area=>{
    const houses = areas[area];
    const done = houses.filter((h,i)=>records[area+"_"+i]).length;
    const percent = houses.length ? Math.round(done/houses.length*100) : 0;
    return `<button class="btn" onclick="openArea('${area}')">${area}<br><span style="font-size:13px">${done}/${houses.length} (${percent}%)</span></button>`;
  }).join("");
}

function openArea(area){
  currentArea = area;
  currentIndex = 0;
  showPage("visitPage");
  renderHouse();
}

function recordKey(){
  return currentArea + "_" + currentIndex;
}

function renderHouse(){
  document.getElementById("areaTitle").innerText = currentArea;
  const houses = areas[currentArea];

  const done = houses.filter((h,i)=>records[currentArea+"_"+i]).length;
  const percent = houses.length ? Math.round(done/houses.length*100) : 0;
  document.getElementById("areaBar").style.width = percent+"%";
  document.getElementById("areaProgress").innerText = `진행률 ${done}/${houses.length} (${percent}%)`;

  if(currentIndex >= houses.length){
    document.getElementById("houseInfo").innerHTML = `
      <div class="houseBox">
        <b>이 구역 방문이 끝났습니다.</b><br>
        구역 선택으로 돌아가 다른 구역을 선택하세요.
      </div>
    `;
    return;
  }

  const h = houses[currentIndex];
  const rec = records[recordKey()];
  const statusBadge = rec ? `<span class="badge done">저장됨: ${rec.status}</span>` : `<span class="badge">미기록</span>`;

  document.getElementById("houseInfo").innerHTML = `
    <div class="bigNum">${h.번호}</div>
    <div class="houseBox">
      ${statusBadge}<br>
      <b>건물번호</b><br>
      ${h.건물번호}<br>
      ${h.이름 ? h.이름+"<br>" : ""}
      <span style="color:#555">${currentIndex+1} / ${houses.length}</span>
      ${rec && rec.memo ? `<p><b>기존 메모:</b> ${rec.memo}</p>` : ""}
    </div>
  `;
}

function saveStatus(status){
  const houses = areas[currentArea];
  if(currentIndex >= houses.length) return alert("이 구역 방문이 끝났습니다.");

  const memo = document.getElementById("memoInput").value.trim();
  const h = houses[currentIndex];

  records[recordKey()] = {
    area: currentArea,
    number: h.번호,
    house: h.건물번호,
    name: h.이름 || "",
    status,
    memo,
    date: new Date().toLocaleDateString()
  };

  document.getElementById("memoInput").value="";
  saveAll();
  renderHouse();
  alert("저장되었습니다.");
}

function nextHouse(){
  const houses = areas[currentArea];
  if(currentIndex < houses.length) currentIndex++;
  renderHouse();
}

function prevHouse(){
  if(currentIndex > 0) currentIndex--;
  renderHouse();
}

function renderStats(){
  let allHouses = 0;
  Object.values(areas).forEach(list=>allHouses += list.length);

  const allRecords = Object.values(records);
  const done = allRecords.length;
  const absent = allRecords.filter(r=>r.status==="부재중").length;
  const reject = allRecords.filter(r=>r.status==="방문거절").length;
  const closed = allRecords.filter(r=>r.status==="폐문부재").length;
  const visited = allRecords.filter(r=>r.status==="방문함").length;

  let areaHtml = Object.keys(areas).map(area=>{
    const total = areas[area].length;
    const areaDone = areas[area].filter((h,i)=>records[area+"_"+i]).length;
    const percent = total ? Math.round(areaDone/total*100) : 0;
    return `<p><b>${area}</b>: ${areaDone}/${total} (${percent}%)</p>`;
  }).join("");

  document.getElementById("statsBox").innerHTML = `
    <p>전체 집 수: ${allHouses}</p>
    <p>방문 기록: ${done}</p>
    <p>전체 방문률: ${allHouses ? Math.round(done/allHouses*100) : 0}%</p>
    <p>방문함: ${visited}</p>
    <p>부재중: ${absent}</p>
    <p>방문거절: ${reject}</p>
    <p>폐문부재: ${closed}</p>
    <hr>
    <p>오늘 참여 인원: ${participants.length}명</p>
    <p>구역 방문 팀: ${visitPairs.length}팀</p>
    <p>전시대 팀: ${standPairs.length}팀</p>
    <hr>
    <h3>구역별 방문률</h3>
    ${areaHtml}
  `;
}

function renderSummary(){
  const el = document.getElementById("todaySummary");
  if(!el) return;
  const visitUsed = pairedNames("visit").length;
  const standUsed = pairedNames("stand").length;
  el.innerHTML = `
    오늘 참여: ${participants.length}명<br>
    구역 방문 짝: ${visitPairs.length}팀 / 미배정 ${Math.max(0, participants.length - visitUsed)}명<br>
    전시대 짝: ${standPairs.length}팀 / 미배정 ${Math.max(0, participants.length - standUsed)}명
  `;
}

function resetToday(){
  if(!confirm("오늘 참여자와 짝을 초기화할까요? 방문 기록은 보존됩니다.")) return;
  participants=[];
  visitPairs=[];
  standPairs=[];
  selectedVisit=[];
  selectedStand=[];
  saveAll();
}

function safe(text){
  return String(text).replace(/'/g,"\\'");
}

function renderAll(){
  renderSummary();
  renderParticipants();
  renderPairPage("visit");
  renderPairPage("stand");
  renderAreaButtons();
}

renderAll();
</script>

</body>
</html>
