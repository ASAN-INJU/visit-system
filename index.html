<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>방문 시스템 V8 (최종)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:Arial;margin:0;}
.container{display:flex;height:100vh;}

#map{width:55%;height:100%;}
#panel{width:45%;overflow:auto;padding:10px;}

.summary{
    background:#f5f5f5;
    padding:10px;
    font-size:14px;
}

.card{
    border:1px solid #ccc;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

button{margin:2px;padding:5px;}
.status{font-weight:bold;}

.admin{
    background:#fff7d6;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}

.exportBtn{
    background:#4CAF50;
    color:white;
    border:none;
    padding:8px;
    margin-top:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="summary">
전체: <span id="total"></span> /
완료: <span id="done"></span> /
미방문: <span id="none"></span> /
진행률: <span id="rate"></span>%
</div>

<div class="container">

<div id="map"></div>

<div id="panel">

<div class="admin">
<b>📊 관리자</b><br>
완료: <span id="done2"></span><br>
미방문: <span id="none2"></span><br>
<button class="exportBtn" onclick="exportCSV()">📤 엑셀 다운로드</button>
</div>

<div id="list"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// =====================
// 150집 생성
// =====================
let houses=[];

for(let i=1;i<=150;i++){
    houses.push({
        id:i,
        name:"현대로 "+(1200+i),
        desc:"구역 "+i,
        status:"none",
        lat:36.8+i*0.0004,
        lng:126.9+i*0.0004,
        worker:"미지정"
    });
}

// =====================
// 지도
// =====================
let map=L.map('map').setView([36.8,126.9],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:''
}).addTo(map);

let markers=[];

// =====================
// GPS
// =====================
if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
        let lat=pos.coords.latitude;
        let lng=pos.coords.longitude;

        L.circleMarker([lat,lng],{
            radius:8,
            color:"blue"
        }).addTo(map).bindPopup("📍 내 위치");

        map.setView([lat,lng],14);
    });
}

// =====================
// 상태 변경
// =====================
function setStatus(id,status){
    let h=houses.find(x=>x.id===id);
    h.status=status;
    render();
    drawMarkers();
}

// =====================
// 작업자 지정 (팀 기능)
// =====================
function setWorker(id,name){
    let h=houses.find(x=>x.id===id);
    h.worker=name;
    render();
}

// =====================
// 마커
// =====================
function drawMarkers(){

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    houses.forEach(h=>{

        let color="blue";
        if(h.status==="visited") color="green";
        if(h.status==="absent") color="orange";
        if(h.status==="reject") color="red";
        if(h.status==="closed") color="gray";

        let m=L.circleMarker([h.lat,h.lng],{
            radius:6,
            color:color
        }).addTo(map);

        m.bindPopup(`
            <b>${h.name}</b><br>
            상태: ${h.status}<br>
            담당: ${h.worker}
        `);

        m.on('click',()=>{
            setStatus(h.id,"visited");
        });

        markers.push(m);
    });
}

// =====================
// CSV 다운로드 (엑셀)
// =====================
function exportCSV(){

    let csv="ID,이름,상태,담당자\n";

    houses.forEach(h=>{
        csv+=`${h.id},${h.name},${h.status},${h.worker}\n`;
    });

    let blob=new Blob([csv],{type:"text/csv"});
    let url=URL.createObjectURL(blob);

    let a=document.createElement("a");
    a.href=url;
    a.download="visit_report.csv";
    a.click();
}

// =====================
// 렌더
// =====================
function render(){

    let list=document.getElementById("list");
    list.innerHTML="";

    let total=houses.length;
    let done=houses.filter(h=>h.status==="visited").length;
    let none=houses.filter(h=>h.status==="none").length;
    let rate=Math.round(done/total*100);

    document.getElementById("total").innerText=total;
    document.getElementById("done").innerText=done;
    document.getElementById("none").innerText=none;
    document.getElementById("rate").innerText=rate;

    document.getElementById("done2").innerText=done;
    document.getElementById("none2").innerText=none;

    houses.forEach(h=>{

        let statusText="미방문";
        if(h.status==="visited") statusText="방문";
        if(h.status==="absent") statusText="부재중";
        if(h.status==="reject") statusText="거절";
        if(h.status==="closed") statusText="폐문";

        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <b>${h.name}</b><br>
            상태: <span class="status">${statusText}</span><br>
            담당: ${h.worker}<br>

            <button onclick="setStatus(${h.id},'visited')">방문</button>
            <button onclick="setStatus(${h.id},'absent')">부재중</button>
            <button onclick="setStatus(${h.id},'reject')">거절</button>
            <button onclick="setStatus(${h.id},'closed')">폐문</button>
            <button onclick="setWorker(${h.id},prompt('이름 입력'))">담당자</button>
        `;

        list.appendChild(div);
    });
}

// =====================
// 시작
// =====================
render();
drawMarkers();

</script>

</body>
</html>
