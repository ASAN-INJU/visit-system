<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi Ultimate</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f6fa;
  color:#222;
}

header{
  background:#111827;
  color:white;
  padding:20px;
  text-align:center;
}

h1{
  margin:0;
}

.search{
  padding:15px;
}

input{
  width:75%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:12px;
  border:0;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

.card{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 6px #ddd;
}

.score{
  font-size:28px;
  font-weight:bold;
  color:#2563eb;
}

.menu{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<header>
<h1>Hi Ultimate</h1>
<p>AI 주식 분석 시스템</p>
</header>


<div class="search">
<input id="stock" placeholder="종목 검색">
<button onclick="searchStock()">검색</button>
</div>


<div class="card">
<h3>⭐ 관심 종목</h3>
<p>삼성전자</p>
<p>SK하이닉스</p>
<p>테슬라</p>
</div>


<div class="card">
<h3>📊 AI 분석 점수</h3>
<div class="score">82점</div>
<p>상승 가능성 분석 중</p>
</div>


<div class="card">
<h3>📰 오늘의 뉴스</h3>
<p>반도체 관련 뉴스 ↑</p>
<p>AI 관련 종목 관심 증가</p>
</div>


<div class="card">
<h3>📈 기술 분석</h3>
<p>5일 이동평균선 : 상승</p>
<p>20일 이동평균선 : 유지</p>
</div>


<div class="menu">
<div>홈</div>
<div>뉴스</div>
<div>분석</div>
<div>관심</div>
</div>


<script>
function searchStock(){
 let name=document.getElementById("stock").value;
 alert(name+" 분석 준비");
}
</script>

</body>
</html>
