<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인주회중</title>
<style>
:root{--navy:#1e3a5f;--ink:#111827;--muted:#5f6b78;--line:#d7e0ea;--soft:#f6f8fb}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Malgun Gothic",sans-serif;background:#f5f7fa;color:var(--ink)}
.screen{min-height:100vh;display:none;justify-content:center;align-items:center;padding:24px 18px;opacity:0;transition:opacity .28s ease}
.active{display:flex;opacity:1}
.card{width:100%;max-width:430px;background:white;border:1.8px solid var(--navy);border-radius:24px;padding:32px 26px;text-align:center;box-shadow:0 8px 22px rgba(30,58,95,.08)}
.logo{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:18px}
.welcome{font-size:23px;font-weight:800;line-height:1.45;margin:22px 0}
.verse{margin-top:24px;padding:18px 16px;border:1px solid var(--line);border-radius:17px;background:#fff;font-size:16px;line-height:1.75;word-break:keep-all}
.ref{margin-top:10px;font-weight:800;color:var(--navy);font-size:15px}
.small{color:var(--muted);font-size:14px;margin-top:10px}
.footer{margin-top:26px;background:var(--navy);color:white;padding:12px;border-radius:14px;font-weight:800;font-size:15px}
.title{font-size:23px;font-weight:800;color:var(--navy);margin-bottom:26px}
.menu-btn,.select-btn{width:100%;border:1.8px solid var(--navy);background:white;border-radius:18px;padding:18px;margin:14px 0;font-size:19px;font-weight:800;text-align:left;cursor:pointer;color:var(--ink);transition:transform .08s ease,background .15s ease}
.menu-btn span{display:block;font-size:14px;font-weight:500;color:var(--muted);margin-top:7px;line-height:1.55}
.menu-btn:active,.select-btn:active,.action:active{transform:scale(.985);background:#eef4fb}
.area{font-size:20px;color:var(--navy);font-weight:800;margin-bottom:8px}
.house-box{margin:20px auto 18px;border:2.4px solid var(--navy);border-radius:20px;padding:18px 16px;max-width:248px;background:#fff}
.house-label{font-size:14px;color:var(--muted);font-weight:700}
.house-number{font-size:35px;font-weight:900;color:#0f172a;margin-top:5px}
.info{font-size:17px;line-height:1.65;margin-bottom:14px;word-break:keep-all}
.direction{background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:14px;font-size:17px;font-weight:800;margin:14px 0;line-height:1.55}
.status-text{font-size:15px;color:var(--muted);margin:12px 0;font-weight:700}
.action{width:100%;border:none;border-radius:16px;padding:16px;margin:8px 0;font-size:18px;font-weight:900;cursor:pointer;transition:transform .08s ease,filter .15s ease}
.done{background:#dff4e6}.absent{background:#fff0bd}.revisit{background:#e3ecff}.reject{background:#ffe0e0}.back{background:var(--navy);color:white}.gray{background:#eef2f7;color:#111827}
.nav-row{display:flex;gap:12px;margin-top:10px}.nav-row button{flex:1}
.progress{margin:18px 0;text-align:left;font-weight:800;color:var(--navy);font-size:15px}
.bar{height:12px;background:#e5e9ef;border-radius:99px;overflow:hidden;margin-top:8px}.bar-fill{height:100%;background:var(--navy);width:0%;transition:width .25s ease}
.end-message{font-size:23px;font-weight:800;color:var(--navy);line-height:1.65}
@media(max-width:380px){.card{padding:28px 20px}.house-number{font-size:32px}.title{font-size:21px}.menu-btn{font-size:18px}}
</style>
</head>
<body>
<section id="splash" class="screen active"><div class="card"><div class="logo">인주회중</div><div class="welcome">야외봉사 참여를<br>환영합니다!</div><div class="small">잠시 후 메뉴로 이동합니다</div><div class="verse">“그리고 이 왕국의 좋은 소식이 모든 민족에게 증거되기 위해 사람이 거주하는 온 땅에 전파될 것입니다. 그리고 끝이 올 것입니다.”<div class="ref">— 마태복음 24:14</div></div><div class="footer">인주회중</div></div></section>

<section id="menu" class="screen"><div class="card"><div class="title">오늘 야외봉사를 선택해 주세요!</div>
<button class="menu-btn" onclick="showScreen('areaSelect')">🏠 호별방문<span>구역 방문 기록을 시작합니다</span></button>
<button class="menu-btn">🪧 전시대봉사<span>수요일 18:00~20:00<br>토요일 10:00~12:00</span></button>
<button class="menu-btn">👥 오늘 참여<span>참여자와 차량 정보를 입력합니다</span></button>
<button class="menu-btn">👤 관리자<span>짝짓기 · 차량 · 진행 현황 관리</span></button>
<button class="menu-btn" onclick="showScreen('end')">마침<span>오늘 봉사를 마칩니다</span></button>
<div class="footer">인주회중</div></div></section>

<section id="areaSelect" class="screen"><div class="card"><div class="title">방문 구역 선택</div>
<button class="select-btn" onclick="startArea('걸매리')">걸매리</button>
<button class="select-btn" onclick="startArea('문방리')">문방리</button>
<button class="select-btn" onclick="startArea('관암리')">관암리</button>
<button class="action back" onclick="showScreen('menu')">메뉴로</button></div></section>

<section id="visit" class="screen"><div class="card"><div class="area" id="areaName">걸매리</div>
<div class="house-box"><div class="house-label">건물번호</div><div class="house-number" id="houseNumber">1181-35</div></div>
<div class="info" id="houseInfo">여원다육이<br>현대로 1181-35</div>
<div class="direction">📍 현재 위치 기준<br>↗ 오른쪽 방향 · 약 35m</div>
<div class="status-text" id="statusText">아직 기록 없음</div>
<button class="action done" onclick="saveStatus('방문완료')">방문완료</button>
<button class="action absent" onclick="saveStatus('부재')">부재</button>
<button class="action revisit" onclick="saveStatus('재방문')">재방문</button>
<button class="action reject" onclick="saveStatus('방문거절')">방문거절</button>
<div class="nav-row"><button class="action gray" onclick="prevHouse()">이전</button><button class="action gray" onclick="nextHouse()">다음</button></div>
<div class="progress">진행률 <span id="progressText">0 / 0</span><div class="bar"><div class="bar-fill" id="barFill"></div></div></div>
<button class="action back" onclick="showScreen('areaSelect')">구역 선택으로</button></div></section>

<section id="end" class="screen"><div class="card"><div class="end-message">오늘도 수고 많으셨습니다.<br><br>남은 하루,<br>행복한 시간 되세요. 😊</div><button class="action back" onclick="showScreen('menu')">돌아가기</button></div></section>

<script>
const data={"걸매리":[{num:"1181-35",name:"여원다육이",addr:"현대로 1181-35"},{num:"1181-40",name:"동화기업",addr:"현대로 1181-40"},{num:"1209-41",name:"폐가",addr:"현대로 1209-41"},{num:"1231",name:"금문산업",addr:"현대로 1231"}],"문방리":[{num:"391-8",name:"문방리 주택",addr:"문방리 391-8"},{num:"392-5",name:"문방리 주택",addr:"문방리 392-5"}],"관암리":[{num:"1462-7",name:"관암리 주택",addr:"아산만로1462번길 7"},{num:"1462-15",name:"관암리 주택",addr:"아산만로1462번길 15"}]};
let currentArea="걸매리";let currentIndex=0;
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));setTimeout(()=>document.getElementById(id).classList.add('active'),40)}
setTimeout(()=>showScreen('menu'),3000);
function startArea(area){currentArea=area;currentIndex=0;renderHouse();showScreen('visit')}
function key(){return "visit_"+currentArea+"_"+currentIndex}
function renderHouse(){const h=data[currentArea][currentIndex];document.getElementById("areaName").innerText=currentArea;document.getElementById("houseNumber").innerText=h.num;document.getElementById("houseInfo").innerHTML=h.name+"<br>"+h.addr;const saved=localStorage.getItem(key());document.getElementById("statusText").innerText=saved?"기록: "+saved:"아직 기록 없음";updateProgress()}
function saveStatus(status){localStorage.setItem(key(),status);renderHouse();if(status==="방문완료"){setTimeout(()=>nextHouse(),650)}}
function nextHouse(){if(currentIndex<data[currentArea].length-1){currentIndex++;renderHouse()}}
function prevHouse(){if(currentIndex>0){currentIndex--;renderHouse()}}
function updateProgress(){const list=data[currentArea];let done=0;list.forEach((_,i)=>{if(localStorage.getItem("visit_"+currentArea+"_"+i))done++});const percent=Math.round(done/list.length*100);document.getElementById("progressText").innerText=done+" / "+list.length+" ("+percent+"%)";document.getElementById("barFill").style.width=percent+"%"}
</script>
</body>
</html>
