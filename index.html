<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>인주회중</title>
<style>
body{font-family:-apple-system,sans-serif;background:#f5f7fb;margin:0}
.box{max-width:480px;margin:10px auto;background:#fff;border:2px solid #153b63;border-radius:20px;padding:12px}
h2{color:#153b63;margin:6px 0 8px;font-size:21px;display:flex;justify-content:space-between}
.progress{font-weight:bold;color:#153b63;margin:6px 0 10px;font-size:15px}
.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:5px 0}
.fill{height:100%;width:0%;background:#153b63}
.card{border:1px solid #ccc;border-radius:12px;padding:8px;margin:7px 0;font-size:16px;line-height:1.35}
.top{display:flex;align-items:center;gap:8px;font-weight:bold;font-size:18px}
.num{background:#153b63;color:white;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex:none}
.state{font-size:14px;color:#555;margin:3px 0}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:7px}
.etcgrid{display:none;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:6px}
button{padding:9px 2px;border:0;border-radius:9px;font-weight:bold;font-size:13px}
.done{background:#dff5e5}.abs{background:#fff1c7}.rev{background:#e5efff}.rej{background:#ffe0e0}.etc{background:#eee}
.nav{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.nav button,.back{background:#153b63;color:white;font-size:16px}
.back{width:100%;margin-top:8px}
</style>
</head>
<body>
<div class="box">
<h2><span>걸매리</span><span>1~3 / 12집</span></h2>
<div class="progress">진행률</div>
<div class="bar"><div class="fill"></div></div>
<div class="progress">0 / 12 기록 (0%)</div>

<div class="card">
  <div class="top"><div class="num">1</div><div>걸매길100번길 5-5</div></div>
  <div class="state">상태 : 미방문</div>
  <div class="grid">
    <button class="done">완료</button><button class="abs">부재</button><button class="rev">재방문</button><button class="rej">거절</button><button class="etc" onclick="toggleEtc(1)">기타▼</button>
  </div>
  <div id="etc1" class="etcgrid"><button>폐가</button><button>창고</button><button>축사</button></div>
</div>

<div class="card">
  <div class="top"><div class="num">2</div><div>걸매길100번길 5-3</div></div>
  <div class="state">상태 : 미방문</div>
  <div class="grid">
    <button class="done">완료</button><button class="abs">부재</button><button class="rev">재방문</button><button class="rej">거절</button><button class="etc" onclick="toggleEtc(2)">기타▼</button>
  </div>
  <div id="etc2" class="etcgrid"><button>폐가</button><button>창고</button><button>축사</button></div>
</div>

<div class="card">
  <div class="top"><div class="num">3</div><div>걸매길100번길 5-9</div></div>
  <div class="state">상태 : 미방문</div>
  <div class="grid">
    <button class="done">완료</button><button class="abs">부재</button><button class="rev">재방문</button><button class="rej">거절</button><button class="etc" onclick="toggleEtc(3)">기타▼</button>
  </div>
  <div id="etc3" class="etcgrid"><button>폐가</button><button>창고</button><button>축사</button></div>
</div>

<div class="nav">
<button>◀ 이전3집</button>
<button>다음3집 ▶</button>
</div>
<button class="back">구역 선택으로</button>
</div>

<script>
function toggleEtc(no){
  const box=document.getElementById("etc"+no);
  box.style.display=box.style.display==="grid" ? "none" : "grid";
}
</script>
</body>
</html>
